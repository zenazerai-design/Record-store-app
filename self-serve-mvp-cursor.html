<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Resolve assets for file:// opens and GitHub Pages /Record-store-app/ (not http folder-name paths). -->
  <script>
  (function () {
    function insertBase(href) {
      if (document.querySelector("base")) return;
      var b = document.createElement("base");
      b.href = href;
      var head = document.head;
      var cs = head.querySelector("meta[charset]");
      if (!cs) { head.insertBefore(b, head.firstChild); return; }
      if (cs.nextElementSibling) head.insertBefore(b, cs.nextElementSibling);
      else head.appendChild(b);
    }
    if (location.protocol === "file:") {
      try {
        var u = new URL(location.href);
        if (/\.html?$/i.test(u.pathname)) {
          u.pathname = u.pathname.replace(/\/[^/]*$/, "/");
          u.search = "";
          u.hash = "";
          insertBase(u.href);
        }
      } catch (e) {}
      return;
    }
    var prefix = "/Record-store-app/";
    var p = location.pathname;
    if (p === "/Record-store-app" || p.indexOf(prefix) === 0) insertBase(prefix);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moved: GWI workshop | Zena Zerai</title>

  <meta name="robots" content="noindex" />
</head>
