<!DOCTYPE html>

  <script>
  (function () {
    function insertBase(href) {
      if (document.querySelector("base")) return;
      var b = document.createElement("base");
      b.href = href;
      var head = document.head;
      var cs = head.querySelector("meta[charset]");
      if (!cs) { head.insertBefore(b, head.firstChild); return; }
      if (cs.nextElementSibling) head.insertBefore(b, cs.nextElementSibling);
      else head.appendChild(b);
    }
    if (location.protocol === "file:") {
      try {
        var u = new URL(location.href);
        if (/\.html?$/i.test(u.pathname)) {
          u.pathname = u.pathname.replace(/\/[^/]*$/, "/");
          u.search = "";
          u.hash = "";
          insertBase(u.href);
        }
      } catch (e) {}
      return;
    }
    var prefix = "/Record-store-app/";
    var p = location.pathname;
    if (p === "/Record-store-app" || p.indexOf(prefix) === 0) insertBase(prefix);
  })();
  </script>

  <script>
  (function () {
    var current = 0;
    var track = document.getElementById("t-track");
    var slides = Array.prototype.slice.call(track.querySelectorAll(".oryzo-t__slide"));
    var dots = Array.prototype.slice.call(document.querySelectorAll(".oryzo-t__dot"));
    var prevBtn = document.getElementById("t-prev");
    var nextBtn = document.getElementById("t-next");
    var carousel = document.getElementById("t-carousel");
    var count = slides.length;

    var touchStartX = 0;
    var touchDeltaX = 0;
    var isDragging = false;

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function positionSlides(activeIndex) {
      slides.forEach(function (slide, i) {
        var offset = i - activeIndex;
        if (offset > count / 2) offset -= count;
        if (offset < -count / 2) offset += count;

        slide.dataset.offset = String(offset);
        slide.classList.toggle("is-active", offset === 0);
        slide.setAttribute("aria-hidden", offset === 0 ? "false" : "true");

        var card = slide.querySelector(".oryzo-t__card");
        card.setAttribute("tabindex", offset === 0 ? "0" : "-1");
      });

      track.dataset.active = String(activeIndex);
    }

    function goTo(index) {
      var next = mod(index, count);
      if (next === current) return;
      current = next;
      positionSlides(current);

      dots.forEach(function (dot, i) {
        var active = i === current;
        dot.classList.toggle("is-active", active);
        dot.setAttribute("aria-selected", active ? "true" : "false");
      });
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    dots.forEach(function (dot) {
      dot.addEventListener("click", function () {
        goTo(parseInt(dot.dataset.index, 10));
      });
    });

    slides.forEach(function (slide) {
      var card = slide.querySelector(".oryzo-t__card");

      function navigateIfAdjacent(e) {
        var offset = parseInt(slide.dataset.offset, 10);
        if (offset === 0 || isNaN(offset)) return;
        e.preventDefault();
        e.stopPropagation();
        goTo(current + offset);
      }

      card.addEventListener("click", navigateIfAdjacent);
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    carousel.addEventListener("pointerdown", function (e) {
      if (e.button !== 0) return;
      var slide = e.target.closest(".oryzo-t__slide");
      if (slide && slide.dataset.offset !== "0") return;
      isDragging = true;
      touchStartX = e.clientX;
      touchDeltaX = 0;
      carousel.setPointerCapture(e.pointerId);
    });

    carousel.addEventListener("pointermove", function (e) {
      if (!isDragging) return;
      touchDeltaX = e.clientX - touchStartX;
    });

    carousel.addEventListener("pointerup", function (e) {
      if (!isDragging) return;
      isDragging = false;
      carousel.releasePointerCapture(e.pointerId);
      if (Math.abs(touchDeltaX) > 48) {
        if (touchDeltaX < 0) next();
        else prev();
      }
      touchDeltaX = 0;
    });

    carousel.addEventListener("pointercancel", function () {
      isDragging = false;
      touchDeltaX = 0;
    });

    requestAnimationFrame(function () {
      document.body.classList.add("is-ready");
      positionSlides(0);
    });
  })();
  </script>
