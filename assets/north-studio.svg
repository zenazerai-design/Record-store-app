<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="North Studio AI editor mockup">
  <defs>
    <linearGradient id="ns-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F1430"/>
      <stop offset="1" stop-color="#0F0A1A"/>
    </linearGradient>
    <linearGradient id="ns-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF6EE"/>
      <stop offset="1" stop-color="#F0E7D7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#ns-bg)"/>

  <!-- top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#160B22"/>
  <circle cx="22" cy="24" r="6" fill="#6E4F8F"/>
  <circle cx="42" cy="24" r="6" fill="#3A2C20"/>
  <circle cx="62" cy="24" r="6" fill="#3A2C20"/>
  <rect x="100" y="18" width="160" height="12" rx="3" fill="#3A2C20"/>

  <!-- sidebar -->
  <rect x="0" y="48" width="160" height="752" fill="#160B22"/>
  <rect x="20" y="76" width="120" height="10" rx="3" fill="#6E4F8F"/>
  <rect x="20" y="98" width="80" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="120" width="100" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="142" width="80" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="178" width="120" height="10" rx="3" fill="#6E4F8F"/>
  <rect x="20" y="200" width="100" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="222" width="60" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="244" width="110" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="266" width="80" height="8" rx="2" fill="#3A2C20"/>
  <rect x="20" y="288" width="120" height="32" rx="6" fill="#6E4F8F"/>
  <rect x="32" y="300" width="60" height="8" rx="2" fill="#FBF6EE"/>

  <!-- editor "page" -->
  <rect x="200" y="84" width="560" height="640" rx="10" fill="url(#ns-page)"/>

  <!-- doc title -->
  <rect x="232" y="118" width="280" height="20" rx="3" fill="#1A1410"/>
  <rect x="232" y="148" width="180" height="10" rx="2" fill="#8A7A66"/>

  <!-- paragraph lines -->
  <g fill="#1A1410">
    <rect x="232" y="190" width="496" height="8" rx="2"/>
    <rect x="232" y="206" width="464" height="8" rx="2"/>
    <rect x="232" y="222" width="320" height="8" rx="2" fill="#6E4F8F"/>
    <rect x="232" y="248" width="496" height="8" rx="2"/>
    <rect x="232" y="264" width="440" height="8" rx="2"/>
    <rect x="232" y="280" width="380" height="8" rx="2"/>
  </g>

  <!-- AI suggestion card -->
  <g>
    <rect x="232" y="320" width="496" height="120" rx="10" fill="#FBF6EE" stroke="#6E4F8F" stroke-width="2" stroke-dasharray="6 6"/>
    <rect x="252" y="340" width="80" height="20" rx="10" fill="#6E4F8F"/>
    <text x="292" y="355" font-family="Inter, sans-serif" font-weight="600" font-size="12" fill="#FBF6EE" text-anchor="middle">AI � Suggest</text>
    <rect x="252" y="376" width="440" height="8" rx="2" fill="#1A1410"/>
    <rect x="252" y="392" width="400" height="8" rx="2" fill="#1A1410"/>
    <rect x="252" y="408" width="180" height="8" rx="2" fill="#8A7A66"/>

    <rect x="612" y="404" width="80" height="22" rx="6" fill="#1A1410"/>
    <text x="652" y="420" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#FBF6EE" text-anchor="middle">Accept</text>
  </g>

  <!-- more lines -->
  <g fill="#1A1410">
    <rect x="232" y="464" width="496" height="8" rx="2"/>
    <rect x="232" y="480" width="380" height="8" rx="2"/>
    <rect x="232" y="496" width="440" height="8" rx="2"/>
    <rect x="232" y="512" width="220" height="8" rx="2" fill="#6E4F8F"/>
  </g>

  <!-- prompt bar at bottom -->
  <rect x="200" y="666" width="560" height="58" rx="29" fill="#1A1410"/>
  <circle cx="232" cy="695" r="14" fill="#6E4F8F"/>
  <text x="232" y="700" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#FBF6EE" text-anchor="middle">N</text>
  <rect x="260" y="688" width="380" height="14" rx="3" fill="#3A2C20"/>
  <rect x="700" y="678" width="40" height="34" rx="17" fill="#6E4F8F"/>
</svg>
