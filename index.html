<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <script>
  (function () {
    var q = location.search || '';
    var h = location.hash || '';
    location.replace('home.html' + q + h);
  })();
  </script>
  <meta http-equiv="refresh" content="0;url=home.html" />
  <link rel="canonical" href="home.html" />
</head>
<body style="margin:0;padding:24px;background:#1a1510;color:#fce8cf;font-family:system-ui,sans-serif;line-height:1.5;">
  <p>If you are not redirected, open <a href="home.html" style="color:#eab367;">home</a>.</p>
</body>
</html>
